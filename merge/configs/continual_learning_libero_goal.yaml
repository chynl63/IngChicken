seed: 42
device: "cuda:1"
weights_dir: "/workspace/checkpoints/pretrain_libero90_ema.pt"

benchmark:
  name: "libero_goal"
  task_order_index: 0
  data_root: "/workspace/data"

data:
  obs_horizon: 2
  action_horizon: 16
  action_dim: 7
  batch_size: 64
  num_workers: 4
  normalize_action: true
  use_eye_in_hand: true
  image_size: [128, 128]
  obs_keys:
    - "agentview_image"
    - "ee_pos"
    - "ee_ori"
    - "gripper_states"

vision_encoder:
  type: "resnet18"
  pretrained: true
  feature_dim: 512
  spatial_softmax: true
  num_kp: 32

diffusion:
  type: "ddpm"
  num_diffusion_steps: 100
  beta_schedule: "squaredcos_cap_v2"
  prediction_type: "epsilon"
  clip_sample: true

unet:
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true

continual_learning:
  epochs_per_task: 50

training:
  learning_rate: 1.0e-4
  weight_decay: 1.0e-6
  lr_scheduler: "cosine"
  lr_warmup_steps: 500
  ema_decay: 0.995
  gradient_clip: 1.0
  mixed_precision: true

sdft:
  enabled: false
  lambda_sdft: 0.1
  sdft_rollout_interval: 500
  teacher_sync_interval: 500
  sdft_rollout_horizon: 300
  sdft_num_episodes: 2
  sdft_max_states_per_batch: 64
  sdft_ddim_steps: 16
  log_sdft_debug: false

evaluation:
  num_episodes: 20
  max_steps_per_episode: 300
  action_execution_horizon: 8
  use_ddim: true
  ddim_steps: 16
  save_video: false
  save_plots: true
  video_fps: 10
  num_videos_per_task: 2
  video_episode_policy: "first_k"
  video_rotate_180: false
  video_crop_bottom_frac: 0.0

replay:
  enabled: true
  buffer_size: 1000
  mix_ratio: 0.5

logging:
  project: "diffusion_policy_cl_libero_goal_er"
  log_interval: 50
  exp_name: "cl_libero_goal_er"
  checkpoint_dir: "/workspace/checkpoints/cl_libero_goal_er"
  results_dir: "/workspace/results/cl_libero_goal_er"
  use_wandb: false
  use_tensorboard: true
