seed: 42
device: "cuda"

benchmark:
  name: "libero_object"
  task_order_index: 0
  data_root: "/workspace/data"

data:
  obs_horizon: 2
  action_horizon: 16
  action_dim: 7
  batch_size: 64
  num_workers: 4
  normalize_action: true
  use_eye_in_hand: true
  image_size: [128, 128]
  obs_keys:
    - "agentview_image"
    - "ee_pos"
    - "ee_ori"
    - "gripper_states"

vision_encoder:
  type: "resnet18"
  pretrained: true
  feature_dim: 512
  spatial_softmax: true
  num_kp: 32

diffusion:
  type: "ddpm"
  num_diffusion_steps: 100
  beta_schedule: "squaredcos_cap_v2"
  prediction_type: "epsilon"
  clip_sample: true

unet:
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true

continual_learning:
  epochs_per_task: 50

# On-policy SDFT (optional). use_sdft=false keeps behavior identical to baseline CL.
sdft:
  use_sdft: false
  lambda_sdft: 0.1
  sdft_rollout_interval: 500
  teacher_sync_interval: 500
  sdft_rollout_horizon: 600
  sdft_num_episodes: 2
  sdft_max_states_per_batch: 64
  sdft_ddim_steps: 16
  teacher_update_mode: "periodic_sync"
  teacher_ema_decay: 0.995
  log_sdft_debug: false

training:
  learning_rate: 1.0e-4
  weight_decay: 1.0e-6
  lr_scheduler: "constant"
  lr_warmup_steps: 0
  ema_decay: 0.995
  gradient_clip: 1.0
  mixed_precision: true

evaluation:
  num_episodes: 20
  max_steps_per_episode: 600
  action_execution_horizon: 8
  use_ddim: true
  ddim_steps: 16
  save_plots: true
  # Optional rollout videos (off by default; used by evaluate_checkpoints.py)
  save_video: false
  video_fps: 10
  num_videos_per_task: 2
  # first_k | balanced_two (balanced_two면 num_videos_per_task 무시)
  video_episode_policy: first_k
  # Video-only postprocess (policy still uses raw agentview in sim)
  video_rotate_180: true
  video_crop_bottom_frac: 0.15

replay:
  enabled: false
  buffer_size: 0
  mix_ratio: 0.5

logging:
  project: "baseline"
  log_interval: 50
  checkpoint_dir: "/home/cyhoaoen/dp_forgetting_libero/checkpoints/cl_libero_object2"
  results_dir: "/home/cyhoaoen/dp_forgetting_libero/results/cl_libero_object2"
  use_wandb: true
  # Optional W&B knobs (safe defaults; override via env if needed)
  wandb_entity: "ingchicken"
  wandb_run_name: "cl_libero_object2"
  wandb_dir: "/home/cyhoaoen/dp_forgetting_libero/wandb"
